<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Profile Card</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .profile-card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 350px;
      text-align: center;
      overflow: hidden;
      transition: transform 0.3s ease;
    }
    .profile-card:hover {
      transform: translateY(-5px);
    }
    .card-header {
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      height: 120px;
    }
    .avatar-container {
      margin-top: -60px;
    }
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 5px solid #ffffff;
      object-fit: cover;
      background: #e2e8f0;
    }
    .card-body {
      padding: 24px;
    }
    .name {
      font-size: 24px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 4px;
    }
    .title {
      font-size: 14px;
      color: #4f46e5;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    .bio {
      font-size: 15px;
      color: #4b5563;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn-profile {
      display: inline-block;
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: #ffffff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s ease;
    }
    .btn-profile:hover {
      background: #3730a3;
    }
  </style>
</head>
<body>

  <div class="profile-card">
    <div class="card-header"></div>
    <div class="avatar-container">
      <img class="avatar" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=300&q=80" alt="Profile Picture">
    </div>
    <div class="card-body">
      <h2 class="name">Palak Pal</h2>
      <p class="title">Front-End Developer & Trainer</p>
      <p class="bio">B.Tech CSE student passionate about full-stack architectures, clean code design, and mentoring students to master responsive user interfaces.</p>
      <a href="https://github.com/Palak-7998" target="_blank" class="btn-profile">View GitHub Profile</a>
    </div>
  </div>

</body>
</html>
