<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React Counter App</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, sans-serif;
    }
    .card {
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 280px;
      text-align: center;
    }
    .counter-display {
      font-size: 64px;
      font-weight: bold;
      margin: 20px 0;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    button {
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: #ffffff;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    function Counter() {
      const [count, setCount] = React.useState(0);

      return (
        <div className="card">
          <h3 style={{ color: '#4b5563', margin: 0 }}>React Counter App</h3>
          <div className="counter-display" style={{ color: count > 0 ? '#10b981' : count < 0 ? '#ef4444' : '#374151' }}>
            {count}
          </div>
          <div className="btn-group">
            <button style={{ backgroundColor: '#ef4444' }} onClick={() => setCount(count - 1)}>
              Decrement
            </button>
            <button style={{ backgroundColor: '#6b7280' }} onClick={() => setCount(0)}>
              Reset
            </button>
            <button style={{ backgroundColor: '#10b981' }} onClick={() => setCount(count + 1)}>
              Increment
            </button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Counter />);
  </script>

</body>
</html>
